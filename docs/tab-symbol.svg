<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    Tab-Taste Symbol — The Well Keycap Design
    Farbschema: Modifier (#1E2830 Hintergrund, #5A7A90 Legende)
    Zeichen: ↹ U+21B9 (Segoe UI Symbol)
  -->

  <!-- Keycap-Hintergrund (Modifier-Farbe) -->
  <rect width="164" height="128" rx="12" fill="#1E2830"/>

  <!-- ⇨ U+21E8, etwas nach links damit Platz fuer den Balken rechts -->
  <text
    x="60" y="82"
    font-family="Segoe UI Symbol, Symbola, sans-serif"
    font-size="72"
    text-anchor="middle"
    fill="#5A7A90">⇨</text>

  <!-- Bar directly at arrowhead tip (glyph right edge ~x=92) -->
  <rect x="85" y="45" width="2" height="35" rx="2.5" fill="#5A7A90"/>
</svg>
