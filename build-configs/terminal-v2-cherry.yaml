# Build config: Terminal v2 — Antons-template.pdf (Per-Key-Design-System v2)
# Design: Phosphor Green Matrix, 75% ISO-DE
# Template: Antons-template.pdf (neues Master aus Affinity 3.2.0, 2026-04-23)
#
# Per-Key-System: palette + fonts + legends kommen aus designs/terminal-v2/
# Statt group-based color_operations jetzt: apply_per_key_design.py
#
# Build:
#   py -3 scripts/apply_per_key_design.py \
#       --design terminal-v2 \
#       --input  templates/Antons-template.pdf \
#       --output templates/terminal-v2-anton-v1.pdf \
#       --coord-map layouts/iso-de-75-anton-coordinate-map.json \
#       --mode   luminance_aware_shift
#
# Body-only (ohne Legenden, für schnellen Farb-Check):
#   py -3 scripts/apply_per_key_design.py ... --no-legends

design_name: terminal-v2-cherry
base_template_pdf: templates/Antons-template.pdf
coordinate_map: layouts/iso-de-75-anton-coordinate-map.json

# Per-Key-Design-System — canonical source of truth
design_path: designs/terminal-v2/
recolor_mode: luminance_aware_shift

# Artwork: Top-view only for smoke test (full artworks can be added later)
artworks: []

# sides: MVP — plain body colour (Phase 2: dedicated artwork per face)
sides:
  mode: solid_body_color

quality_baseline:
  # Antons-template.pdf baseline (2026-04-23); 2390 total drawings
  stroke_count: 2390
  fill_count: 197
  tolerance_pct: 5.0
  color_model: RGB
