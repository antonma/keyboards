# Build config: Laura — Schlaue Prinzessin / Space Princess
# ADR: topic=laura-design (Brain DB, 2026-04-14)
# Palette: dunklerer Range-Wert pro Gruppe (besserer Legende-Kontrast)
design_name: laura
base_template_pdf: templates/GK75-German-Tigry-original.pdf

palette:
  body_alpha:   "#c4b0d8"   # Lavendel/Flieder
  body_mod:     "#d4969c"   # Pastell-Rosa/Rose
  body_fkey:    "#d8c490"   # Champagner-Gold
  body_nav:     "#a0c8b4"   # Mintgrün
  body_accent:  "#ede8f0"   # Weiß mit Sparkle-Tint
  legend_all:   "#5a3a2a"   # Warmes Braun (alle Gruppen, wie Einladungskarten)

artworks:
  - name: tiara
    target_key: space
    aspect_ratio: ASPECT_3_1
    model: quality
    size: 434
    prompt: >
      Watercolor tiara with delicate sparkles and stars, centered on white background,
      soft pastel lavender and champagne gold tones, princess crown illustration,
      flat lay, no text, 4K

  - name: zauberstab
    target_key: esc
    aspect_ratio: ASPECT_1_1
    model: quality
    size: 434
    prompt: >
      Star wand icon, five-pointed star on tip of wand, soft watercolor style,
      pastel lavender and gold, centered on white background, no text, 4K

  - name: planet
    target_key: enter
    aspect_ratio: ASPECT_1_1
    model: quality
    size: 434
    prompt: >
      Small planet with rings, watercolor illustration, pastel mint green and lavender,
      soft space background, centered, no text, 4K

  - name: sterne
    target_keys: [up, down, left, right]
    aspect_ratio: ASPECT_1_1
    model: turbo
    size: 434
    prompt: >
      Single golden five-pointed star, soft watercolor style, warm champagne gold,
      centered on white sparkle background, minimal, no text, 4K

  - name: fkey_champagne
    target_group: fkey
    aspect_ratio: ASPECT_16_3
    model: turbo
    strategy: uniform
    palette: none
    size: 434
    prompt: >
      Soft champagne gold watercolor wash, gentle warm gradient left to right,
      faint sparkle dust scattered across surface, no text, no symbols,
      warm pastel tones, flat matte surface, 4K

  - name: alpha_flowers
    target_group: alpha
    aspect_ratio: ASPECT_16_9
    model: turbo
    strategy: uniform
    palette: none
    size: 434
    prompt: >
      Subtle watercolor floral repeat pattern, tiny lavender and soft pink blossoms
      on soft lilac background, delicate brush strokes, seamless tile,
      no text, pastel palette, 4K

color_operations:
  - group: alpha
    property: body
    color: "#c4b0d8"
  - group: mod
    property: body
    color: "#d4969c"
  - group: fkey
    property: body
    color: "#d8c490"
  - group: nav
    property: body
    color: "#a0c8b4"
  - group: accent
    property: body
    color: "#ede8f0"

quality_baseline:
  stroke_count: null    # TBD — measure after first successful build
  tolerance_pct: 2.0
  expected_colors:
    - "#c4b0d8"
    - "#d4969c"
    - "#d8c490"
    - "#a0c8b4"
    - "#ede8f0"
